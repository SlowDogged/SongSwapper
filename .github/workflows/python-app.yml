name: SongSwapper

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-latest-large]
    name: Build on ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/Library/Caches/pip
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
          
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y \
              libxcb-xkb1 \
              libxcb-image0 \
              libxcb-cursor0 \
              libxcb-render-util0 \
              libxcb-shape0 \
              libxcb-icccm4 \
              libxcb-keysyms1 \
              libxkbcommon-x11-0 \
              libpulse0 \
              xvfb
            
            echo "DISPLAY=:99" >> $GITHUB_ENV
            nohup Xvfb :99 -screen 0 1024x768x16 > /dev/null 2>&1 &
          fi
        shell: bash

      - name: Cache ffmpeg_bin
        id: cache-ffmpeg
        uses: actions/cache@v5
        with:
          path: ffmpeg_bin
          key: ${{ runner.os }}-ffmpeg_bin-v1

      - name: Install ffmpeg_bin
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          pip install gdown
          gdown https://drive.google.com/drive/folders/12uT8tAtQgsXxbXDR9YicvKqeOgL2ORwZ -O ffmpeg_bin --folder

      - name: Build app (Windows)
        if: matrix.os == 'windows-latest'
        run: pyinstaller osu_song_swapper.spec --clean

      - name: Build app (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: pyinstaller osu_song_swapper-linux.spec --clean

      - name: Build app (macOS ARM)
        if: matrix.os == 'macos-latest'
        run: pyinstaller osu_song_swapper-macos.spec --clean --distpath dist-arm

      - name: Build app (macOS Intel)
        if: matrix.os == 'macos-latest-large'
        run: pyinstaller osu_song_swapper-macos.spec --clean --distpath dist-x64

      - name: Package output (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          7z a SongSwapper-windows.zip dist/SongSwapper/*

      - name: Package output (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p 'SongSwapper-linux'
          cp -r 'dist/SongSwapper' 'SongSwapper-linux/'
          cp -r 'ffmpeg_bin' 'SongSwapper-linux/'
          tar -czf 'SongSwapper.tar.gz' -C 'SongSwapper-linux' .

      - name: Package output (macOS)
        if: matrix.os == 'macos-latest' || matrix.os == 'macos-latest-large'
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            DIST_PATH="dist-arm"
          else
            DIST_PATH="dist-x64"
          fi
          cp -r 'osuRadio/ffmpeg_bin' "${DIST_PATH}/SongSwapper.app/Contents/Resources/"

      - name: Upload build artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v6
        with:
          name: SongSwapper-windows
          path: dist/SongSwapper/*

      - name: Upload build artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v6
        with:
          name: SongSwapper-linux
          path: SongSwapper-linux/

      - name: Upload build artifacts (macOS ARM)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v6
        with:
          name: SongSwapper-macos-arm
          path: dist-arm/SongSwapper.app
          retention-days: 1

      - name: Upload build artifacts (macOS x64)
        if: matrix.os == 'macos-latest-large'
        uses: actions/upload-artifact@v6
        with:
          name: SongSwapper-macos-x64
          path: dist-x64/SongSwapper.app
          retention-days: 1

      - name: Upload Release Asset (Windows)
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          files: SongSwapper-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset (Linux)
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          files: SongSwapper.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-universal-macos:
    needs: build
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Download ARM build
        uses: actions/download-artifact@v8
        with:
          name: SongSwapper-macos-arm
          path: dist-arm/SongSwapper.app
      
      - name: Download Intel build
        uses: actions/download-artifact@v8
        with:
          name: SongSwapper-macos-x64
          path: dist-x64/SongSwapper.app
      
      - name: Create universal binary
        run: |
          mkdir -p dist-universal/SongSwapper.app/Contents/MacOS
          cp -r dist-arm/SongSwapper.app/* dist-universal/SongSwapper.app/
          find dist-arm/SongSwapper.app/Contents/MacOS -type f -perm +111 | while read arm_bin; do
            rel_path="${arm_bin#dist-arm/SongSwapper.app/Contents/MacOS/}"
            x64_bin="dist-x64/SongSwapper.app/Contents/MacOS/$rel_path"
            out_bin="dist-universal/SongSwapper.app/Contents/MacOS/$rel_path"
            
            if [ -f "$x64_bin" ]; then
              echo "Creating universal binary for: $rel_path"
              lipo -create "$arm_bin" "$x64_bin" -output "$out_bin"
            fi
          done
      
      - name: Install create-dmg
        run: brew install create-dmg
      
      - name: Create universal .dmg
        run: |
          create-dmg \
            --volname "SongSwapper Installer" \
            --window-pos 200 120 \
            --window-size 854 480 \
            --icon-size 100 \
            --app-drop-link 450 185 \
            SongSwapper.dmg \
            dist-universal/SongSwapper.app
      
      - name: Create universal .pkg
        run: |
          pkgbuild \
            --root dist-universal/SongSwapper.app \
            --identifier com.paraliyzedevo.songswapper \
            --version 1.1.0 \
            --install-location /Applications \
            SongSwapper.pkg

      - name: Upload build artifacts (macOS)
        uses: actions/upload-artifact@v6
        with:
          name: SongSwapper-macos
          path: |
            SongSwapper.pkg
            SongSwapper.dmg

      - name: Upload Release Assets (macOS)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          files: |
            SongSwapper.pkg
            SongSwapper.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}